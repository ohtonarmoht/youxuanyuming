name: Update IP List

on:
  schedule:
    - cron: '0 */4 * * *'  # 每四小时运行一次
  workflow_dispatch:  # 手动触发

jobs:
  update-ip-list:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests
        pip install beautifulsoup4
        pip install socket
        
    - name: Run script
      run: |
        python ${{ github.workspace }}/collect_ips.py
        
    - name: Remove duplicates and unavailable IPs
      run: |
        python -c "
import socket

# 读取 IP 列表
with open('${{ github.workspace }}/ip.txt', 'r') as f:
    ip_list = f.readlines()

# 去除重复的 IP 地址
ip_list = list(set(ip.strip() for ip in ip_list))

# 验证每个 IP 是否可以连接 443 端口（HTTPS）
valid_ips = []

def check_ip(ip):
    try:
        socket.create_connection((ip, 443), timeout=5)
        return ip
    except socket.error:
        return None

# 筛选有效 IP
valid_ips = [ip for ip in ip_list if check_ip(ip)]

# 保存有效 IP 列表
with open('${{ github.workspace }}/ip.txt', 'w') as f:
    for ip in valid_ips:
        f.write(f'{ip}\n')
"

    - name: Commit and push changes
      run: |
        git config --global user.email "ohtonarmoht@gmail.com"
        git config --global user.name "ohtonarmoht"
        if [ -n "$(git status --porcelain)" ]; then
          git add ip.txt
          git commit -m "Automatic update"
          git push
        else
          echo "No changes detected, skipping commit."
        fi
